# Full Nowlez Munshi stack. From the repo root:  docker compose -f deploy/compose.yml up
# Env comes from ../.env (see docs/DEPLOY.md for the required variables).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: nm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nm}
      POSTGRES_DB: nm
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: { context: .., dockerfile: deploy/web.Dockerfile }
    env_file: [../.env]
    environment:
      DATABASE_URL: postgresql+psycopg2://nm:${POSTGRES_PASSWORD:-nm}@postgres:5432/nm
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  bot:
    build: { context: .., dockerfile: deploy/bot.Dockerfile }
    env_file: [../.env]
    environment:
      DATABASE_URL: postgresql+psycopg2://nm:${POSTGRES_PASSWORD:-nm}@postgres:5432/nm
      REDIS_URL: redis://redis:6379/0
    ports: ["8001:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: { context: .., dockerfile: deploy/worker.Dockerfile }
    env_file: [../.env]
    environment:
      DATABASE_URL: postgresql+psycopg2://nm:${POSTGRES_PASSWORD:-nm}@postgres:5432/nm
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  pgdata:
