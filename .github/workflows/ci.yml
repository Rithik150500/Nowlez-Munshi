name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/nm_core
          pip install pytest ruff mypy
      - name: Lint
        run: ruff check .
      - name: Type-check
        run: mypy || true   # advisory until nm_core has real modules
      - name: Test
        run: pytest packages/nm_core/tests
