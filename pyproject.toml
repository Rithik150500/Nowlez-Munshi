# Workspace tooling root for the Nowlez Munshi monorepo.
# Each package/app has its own pyproject; this file centralizes lint/type/test config.

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["packages/nm_core", "apps"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# Alembic migrations are wide, declarative table definitions.
"**/migrations/**" = ["E501"]
# FastAPI's Depends()/Header() in argument defaults is the framework idiom, not the
# B008 mutable-call-in-default bug.
"apps/**" = ["B008"]

[tool.mypy]
python_version = "3.12"
warn_unused_ignores = true
warn_redundant_casts = true
ignore_missing_imports = true
files = ["packages/nm_core/nm_core"]
# Alembic migrations are declarative DDL with dialect-conditional column types
# that defeat generic inference; not worth type-checking.
exclude = "nm_core/db/migrations/"

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["packages/nm_core/tests", "apps"]
